<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Profile</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #eef1f5);
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-card {
            max-width: 700px;
            margin: 80px auto;
            border-radius: 20px;
            padding: 30px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
             min-height: 400px;
        }

        .profile-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .profile-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .profile-item:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 500;
            color: #555;
        }

        .value {
            float: right;
            color: #222;
        }
    </style>
</head>
<body>
{% include 'customer/navbar.html' %}
<div class="profile-card">
    <h3 class="profile-title">Customer Profile</h3>

    <div class="profile-item">
        <span class="label">Name</span>
        <span class="value">{{ profile.full_name }}</span>
    </div>

    <div class="profile-item">
        <span class="label">Phone</span>
        <span class="value">{{ profile.phone }}</span>
    </div>

    <div class="profile-item">
        <span class="label">City</span>
        <span class="value">{{ profile.city }}</span>
    </div>

    <div class="profile-item">
        <span class="label">Address</span>
        <span class="value">{{ profile.address }}</span>
    </div>
</div>

</body>
</html>
