<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Seller Analysis | AI Dash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #1A2A5E;
            color: white;
            padding: 20px 40px;
        }

        .container {
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            color: #1A2A5E;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .btn {
            padding: 8px 16px;
            background: #fb6a19;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #e05500;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #fb6a19;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header>
        <h2>Admin Seller Intelligence</h2>
    </header>
    <div class="container">
        <a href="{% url 'admin_dashboard' %}" class="back-link">← Back to Dashboard</a>
        <h1>Select a Seller for AI Analysis</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Seller Name</th>
                        <th>City</th>
                        <th>Joined Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in sellers %}
                    <tr>
                        <td><strong>{{ s.display_name }}</strong></td>
                        <td>{{ s.city }}</td>
                        <td>{{ s.created_at|date:"M d, Y" }}</td>
                        <td><span style="color: #2ecc71;">● Active</span></td>
                        <td>
                            <a href="{% url 'admin_seller_report' s.id %}" class="btn">Generate AI Report</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #666;">No active sellers found.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
